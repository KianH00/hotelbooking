<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/054afd37b9.js" crossorigin="anonymous"></script>
    <title>Hotel Reservation Platform</title>
</head>
<body>
    <!--Log In page-->
   <header>
    <h1 class="logo">Boo<span style="color:rgb(251, 255, 0);">K</span>ify</h1>
    <nav class="navigation">    
        <!-- Log in Button on page-->
    </nav>
   </header>
   
   
   <!--Log in form-->
   <div id="wrapper" class="wrapper" >
    
       
    <div class="form-box login">
        <h2>Login</h2>
        <form action="#">
            <div class="input-box">
                <input type="email" required>
                <label>Email</label>
            </div>
            <div class="input-box">
                <input type="password" required>
                <label>Password</label>
            </div>
            <div class="remember-forgot">
                <label><input type="checkbox"> Remember me</label>
            <a href="#">Forgot Password</a>
            </div>
            
            
            <!--Log in Button in the form-->
            <form action="#">
            <button type="submit" class="btnn">Login</button>
            </form>
            <div class="login-register">
                <p>Don't have an account?
                <a href="#" class="register-link">Register</a></p>
            </div>

        </form>
    </div>
    
    
    <!--Register Form-->
    <div class="form-box register" >
        <h2>Registration</h2>
        <form action="#">
            <div class="input-box">
                <input type="text" required>
                <label>Username</label>
            </div>
            <div class="input-box">
                <input type="email" required>
                <label>Email</label>
            </div>
            <div class="input-box">
                <input type="password" required>
                <label>Password</label>
            </div>
            <div class="remember-forgot">
                <label><input type="checkbox"> I agree to the terms & conditions</label>
            </div>
            
            
            <!--Register Button in the form-->
            <a href="#">
            <button type="submit" class="btnn">Register</button>
            </a>
            <div class="login-register">
                <p>Already have an account?
                <a href="#" class="login-link">Login</a></p>
            </div>
        </form>
    </div>
   </div>


    <script src="script.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
